<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title">Beta</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
     <nav>
        <button onclick="window.location.href='/'">Home</button>
        <button onclick="window.location.href='/submit'" id="submitpost">Submit Post</button>
    </nav>
    <header>
        <h1 id="header"></h1>
    </header>
    <div class="post" id="post-content">
        <div class="post-meta">
            <span id="post-author">Author</span>
            <br>
            <span id="post-date">Date</span>
        </div>
        <h2 id="post-title">Title</h2>
        <p id="post-body">Content</p>
        <div class="post-footer">
            <button onclick="votePost(window.location.pathname.split('/').pop(), 'up')">^</button>
            <span id="vote-count"></span>
            <button onclick="votePost(window.location.pathname.split('/').pop(), 'down')">v</button>
        </div>
    </div>
    <div class="replies">
        <div class="lazy-horizontal">
          <textarea placeholder="Type your thoughts..." id="replytext"></textarea>  
          <button onclick="submitReply()">Reply</button>
        </div>
        <div id="actual">

        </div>
    </div>
    <script src="/post.js"></script>
</body>

</html>
